<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <title>simulador de emprestimo</title>
</head>

<body>



    <main>
        <h1>
            simulador de emprestimo
        </h1>
        <section class="inputs">
            <form action="#">
                <p>
                    <label for="rendabruta">Renda Mensal Bruta(R$):</label>
                    <input type="text" id="rendabruta" placeholder="Digite sua renda bruta mensal">

                </p>

                <p>
                    <label for="tempo">Prazo emprestimo(meses):</label>
                    <input type="text" id="tempo" placeholder="Digite o Prazo em meses">
                </p>

                <p>

                    <label for="valor">Valor do emprestimo(R$):</label>
                    <input type="text" id="valor" placeholder="Digite o valor do emprestimo">
                </p>

                <button type="button" onclick="calcular()"> calcular parcelas </button>

                <h2></h2>

                <h3></h3>
            </form>
        </section>
    </main>
    <script>
    function calcular() {
        let renda_bruta = parseFloat(document.getElementById("rendabruta").value);
        let valor = parseFloat(document.getElementById("valor").value);
        let tempo = parseFloat(document.getElementById("tempo").value);
        let resultado = document.querySelector("h2");
         let preencha = document.querySelector("h3");

        
        if (isNaN(renda_bruta) || isNaN(valor) || isNaN(tempo) || tempo === 0) {
            preencha.innerHTML = "Preencha todos os campos corretamente.";
            return;
        }

        let ano = Math.trunc(tempo / 12);

       

        if (ano >= 1) {
            let juros = valor * (ano * 0.02);
            valor = valor + juros;
        }

        let parcela = valor / tempo;

        if (parcela > (renda_bruta * 0.3)) {
            resultado.innerHTML = "Há risco em fazer este empréstimo.";
        } else {
            resultado.innerHTML = "Não há riscos. Parcelas de R$ " + parcela.toFixed(2);
        }
    }
    </script>
    <footer>

    </footer>

</body>

</html>
